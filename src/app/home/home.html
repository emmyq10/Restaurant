<section class="relative h-screen w-full overflow-hidden">

  <header class="fixed dark:bg-slate-950 top-0 inset-x-0 w-full z-50 shadow">
    <div class="mx-auto flex items-center justify-between p-4 max-w-7xl">
      <!-- Logo -->
      <div class="flex items-center gap-4">
        <h2 class="m-0 text-[0.9rem] text-text-white">
          TASTY TOWN
        </h2>
      </div>

      <!-- Desktop nav -->
      <nav class="hidden md:block">
        <ul class="flex list-none gap-8">
          <li>
            <a routerLink="/"
              class="no-underline text-text-white text-base font-medium transition-colors hover:text-text-gray cursor-pointer">
              Home
            </a>
          </li>
          <li>
            <a routerLink="/menu"
              class="no-underline text-text-white text-base font-medium transition-colors hover:text-text-gray cursor-pointer">
              Menu
            </a>
          </li>
          <li>
            <a routerLink="/reservation"
              class="no-underline text-text-white text-base font-medium transition-colors hover:text-text-gray cursor-pointer">
              Reservation
            </a>
          </li>
          <li>
            <a routerLink="/contact"
              class="no-underline text-text-white text-base font-medium transition-colors hover:text-text-gray cursor-pointer">
              Contact Us
            </a>
          </li>
        </ul>
      </nav>

      <!-- Mobile hamburger button -->
      <button type="button"
        class="md:hidden inline-flex items-center justify-center rounded-full p-2 text-text-white hover:bg-white/10 focus:outline-none"
        (click)="toggleMobileMenu()" aria-label="Toggle navigation">
        <svg class="h-10 w-10" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

    </div>

    <!-- Mobile menu -->
    <div class="md:hidden bg-primary border-t border-white/10" *ngIf="isMobileMenuOpen">
      <nav class="max-w-7xl mx-auto px-4 pb-4">
        <ul class="flex flex-col gap-3 pt-3">
          <li>
            <a routerLink="/" (click)="closeMobileMenu()"
              class="block no-underline text-text-gray text-base font-medium transition-colors hover:text-text-gray">
              Home
            </a>
          </li>
          <li>
            <a routerLink="/menu" (click)="closeMobileMenu()"
              class="block no-underline text-text-gray text-base font-medium transition-colors hover:text-text-gray">
              Menu
            </a>
          </li>
          <li>
            <a routerLink="/reservation" (click)="closeMobileMenu()"
              class="block no-underline text-text-gray text-base font-medium transition-colors hover:text-text-gray">
              Reservation
            </a>
          </li>
          <li>
            <a routerLink="/contact" (click)="closeMobileMenu()"
              class="block no-underline text-text-gray text-base font-medium transition-colors hover:text-text-gray">
              Contact Us
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- SLIDES -->
  <div class="absolute inset-0">
    <div class="absolute inset-0 transition-opacity duration-700">
      <img [src]="slides()[currentIndex()]" class="w-full h-full object-cover" alt="hero image" />

      <!-- DARK OVERLAY -->
      <div class="absolute inset-0 bg-black/50"></div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="relative z-10 flex flex-col justify-center items-center text-center h-full px-4">

    <p class="text-sm text-gray-300 italic mb-3">
      Exclusive drink service
    </p>

    <h1 class="text-3xl sm:text-5xl md:text-6xl font-serif text-white mb-6 leading-tight">
      Cocktail stage evenings
    </h1>

    <button routerLink="/menu"
      class="border border-white text-white px-6 py-3 text-sm tracking-wide hover:bg-white hover:text-black transition cursor-pointer">
      ↓ View Menu
    </button>

  </div>

  <!-- NAV ARROWS -->
  <!-- <button (click)="prevSlide()" class="absolute left-4 top-1/2 -translate-y-1/2 text-white text-2xl z-20">
    ‹
  </button>

  <button (click)="nextSlide()" class="absolute right-4 top-1/2 -translate-y-1/2 text-white text-2xl z-20">
    ›
  </button> -->

  <!-- DOT INDICATORS -->
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 z-20">
    @for (img of slides(); track $index) {
    <span class="w-2 h-2 rounded-full bg-white/50" [class.bg-white]="$index === currentIndex()"
      (click)="currentIndex.set($index); resetSlides()"></span>
    }
  </div>

</section>
